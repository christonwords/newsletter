<!doctype html>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=5">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="../">christon</a>
      <nav class="nav" aria-label="beats navigation">
        <a href="../">home</a>
        <a href="../a2v/">a2v</a>
        <a href="https://instagram.com/christonwords/" target="_blank" rel="noreferrer">dm @christonwords</a>
        <a href="mailto:softparish@gmail.com">inquire</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow">storage bin</p>
        <h1>beats</h1>
        <p>thirty second previews only. for purchases, licensing, stems, custom work, or anything business related, email <a href="mailto:softparish@gmail.com">softparish@gmail.com</a> or dm <a href="https://instagram.com/christonwords/" target="_blank" rel="noreferrer">@christonwords</a>.</p>
      </section>

      <section class="beats-panel" aria-labelledby="beats-title">
        <div class="panel-head">
          <div>
            <span>archive</span>
            <h2 id="beats-title">previews</h2>
          </div>
          <p id="beat-count">loading...</p>
        </div>
        <div class="beat-list" id="beat-list"></div>
      </section>
    </main>

    <template id="beat-template">
      <article class="beat-card">
        <button class="play-button" type="button" aria-label="play preview">play</button>
        <div class="beat-main">
          <div class="beat-meta">
            <h3></h3>
            <p></p>
          </div>
          <canvas width="900" height="64"></canvas>
          <audio preload="metadata"></audio>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
